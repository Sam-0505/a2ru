<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Holographic Ecosystem Simulation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        /* ── Title ──────────────────────────────────────────────── */
        #info {
            position: absolute;
            top: 14px;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none;
            transition: opacity 1.2s ease-in-out;
            text-shadow: 0 0 12px rgba(0, 255, 200, 0.5);
        }

        #info h1 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: #aaffee;
        }

        #info p {
            font-size: 0.75rem;
            color: #888;
            margin-top: 4px;
        }

        /* ── Fullscreen btn ─────────────────────────────────────── */
        #start-btn {
            position: absolute;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 22px;
            background: rgba(0, 255, 200, 0.12);
            border: 1px solid #00ffc8;
            color: #00ffc8;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            cursor: pointer;
            z-index: 200;
            border-radius: 8px;
            backdrop-filter: blur(6px);
            transition: all 0.25s;
        }

        #start-btn:hover {
            background: rgba(0, 255, 200, 0.28);
            box-shadow: 0 0 16px rgba(0, 255, 200, 0.5);
        }

        /* ── Ecosystem Panel ────────────────────────────────────── */
        /* Sits in the TOP-LEFT dead zone of the hologram cross     */
        #eco-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 200;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            width: 250px;
        }

        #eco-panel h2 {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #666;
            flex-basis: 100%;
            /* Make h2 take full width in flex container */
            margin-bottom: 2px;
        }

        .spawn-btn {
            background: rgba(20, 20, 30, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px 6px;
            color: #eee;
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: transform 0.1s, background 0.2s;
            backdrop-filter: blur(8px);
            flex: 1 1 calc(50% - 3px);
            /* Allow two buttons per row with gap */
        }

        .spawn-btn .icon {
            font-size: 1.4rem;
        }

        .spawn-btn:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .spawn-btn.pressed {
            transform: scale(0.91);
        }

        .spawn-btn.bamboo {
            border-bottom: 2px solid #8BC34A;
        }

        .spawn-btn.panda {
            border-bottom: 2px solid #e0e0e0;
        }

        .spawn-btn.tree {
            border-bottom: 2px solid #2E7D32;
        }

        .spawn-btn.house {
            border-bottom: 2px solid #FFA726;
        }

        .spawn-btn.factory {
            border-bottom: 2px solid #ef5350;
        }

        .spawn-btn.human {
            border-bottom: 2px solid #42A5F5;
        }

        .panel-divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            margin: 4px 0;
            flex-basis: 100%;
            /* Make divider take full width */
        }

        /* ── HUD ────────────────────────────────────────────────── */
        /* Sits in the BOTTOM-LEFT dead zone of the hologram cross  */
        #hud {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 200;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 10px;
            padding: 8px 12px;
            backdrop-filter: blur(8px);
            font-size: 12px;
            line-height: 1.7;
            pointer-events: none;
            width: 250px;
        }

        #hud h3 {
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 4px;
        }

        .hud-row {
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }

        .hud-val {
            font-weight: 700;
            color: #fff;
        }

        /* ── Alert ──────────────────────────────────────────────── */
        #eco-alert {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%) translateY(-12px);
            background: rgba(10, 10, 18, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 10px 20px;
            font-size: 0.85rem;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s, transform 0.4s;
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }

        #eco-alert.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #eco-alert.fire {
            border-color: #FF3D00;
            color: #ffaa80;
        }

        #eco-alert.safe {
            border-color: #66BB6A;
            color: #aaffaa;
        }
    </style>
</head>

<body>

    <div id="info">
        <h1>🌍 Holographic Ecosystem Simulation</h1>
        <p>Add objects using the panel — watch the ecosystem respond</p>
    </div>

    <button id="start-btn">⛶ Fullscreen</button>

    <!-- Alert banner -->
    <div id="eco-alert"></div>

    <!-- Spawn control panel — top-left dead zone -->
    <div id="eco-panel">
        <h2>Add Objects</h2>
        <button class="spawn-btn bamboo" data-spawn="bamboo"> <span class="icon">🎋</span>Bamboo</button>
        <button class="spawn-btn panda" data-spawn="panda"> <span class="icon">🐼</span>Panda</button>
        <button class="spawn-btn tree" data-spawn="tree"> <span class="icon">🌲</span>Tree</button>
        <button class="spawn-btn house" data-spawn="house"> <span class="icon">🏠</span>House</button>
        <button class="spawn-btn factory" data-spawn="factory"> <span class="icon">🏭</span>Factory</button>
        <button class="spawn-btn human" data-spawn="human"> <span class="icon">🧑</span>Human</button>
    </div>

    <!-- Live HUD -->
    <div id="hud">
        <h3>Ecosystem Status</h3>
        <div class="hud-row"><span>🎋 Bamboo</span> <span class="hud-val" id="hud-bamboo">0</span></div>
        <div class="hud-row"><span>🐼 Pandas</span> <span class="hud-val" id="hud-pandas">0</span></div>
        <div class="hud-row"><span>🌲 Trees</span> <span class="hud-val" id="hud-trees">0</span></div>
        <div class="hud-row"><span>🏠 Houses</span> <span class="hud-val" id="hud-houses">0</span></div>
        <div class="hud-row"><span>🏭 Factories</span> <span class="hud-val" id="hud-factories">0</span></div>
        <div class="hud-row"><span>🧑 Humans</span> <span class="hud-val" id="hud-humans">0</span></div>
        <div class="hud-row"><span>🔥 Fire</span> <span class="hud-val" id="hud-fire" style="color:#66BB6A">✅
                Safe</span></div>
    </div>

    <!-- Import map for Three.js CDN -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "fflate": "https://unpkg.com/fflate@0.7.3/esm/browser.js"
            }
        }
    </script>

    <script type="module" src="./main.js"></script>
</body>

</html>
